<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitScope · GitHub Profile Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── VARIABLES ── */
    :root {
      --bg:         #F0F2F8;
      --surface:    rgba(255,255,255,0.75);
      --surface-2:  rgba(242,242,247,0.80);
      --surface-3:  rgba(229,229,234,0.90);
      --text-1:     #1C1C1E;
      --text-2:     #3A3A3C;
      --text-3:     #8E8E93;
      --accent:     #007AFF;
      --accent-h:   #0062CC;
      --accent-s:   rgba(0,122,255,0.12);
      --danger:     #FF3B30;
      --success:    #34C759;
      --border:     rgba(0,0,0,0.07);
      --border-s:   rgba(0,0,0,0.12);
      --glow:       0 0 0 3px rgba(0,122,255,0.18);
      --sh-sm:      0 2px 8px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
      --sh-md:      0 6px 24px rgba(0,0,0,0.08),0 2px 6px rgba(0,0,0,0.04);
      --sh-lg:      0 16px 48px rgba(0,0,0,0.10),0 4px 12px rgba(0,0,0,0.05);
      --sh-xl:      0 28px 70px rgba(0,0,0,0.12),0 6px 18px rgba(0,0,0,0.06);
      --radius:     22px;
      --chip-a-bg:  rgba(0,122,255,0.12);   --chip-a-fg:#007AFF;
      --chip-b-bg:  rgba(255,149,0,0.12);   --chip-b-fg:#FF9500;
      --chip-c-bg:  rgba(255,45,135,0.12);  --chip-c-fg:#FF2D87;
      --chip-d-bg:  rgba(0,175,93,0.12);    --chip-d-fg:#00AF5D;
    }
    [data-theme="dark"] {
      --bg:         #050508;
      --surface:    rgba(28,28,30,0.80);
      --surface-2:  rgba(44,44,46,0.85);
      --surface-3:  rgba(58,58,60,0.90);
      --text-1:     #FFFFFF;
      --text-2:     rgba(235,235,245,0.85);
      --text-3:     rgba(235,235,245,0.40);
      --border:     rgba(255,255,255,0.07);
      --border-s:   rgba(255,255,255,0.12);
      --accent-s:   rgba(0,122,255,0.20);
      --sh-sm:      0 2px 8px rgba(0,0,0,0.50);
      --sh-md:      0 6px 24px rgba(0,0,0,0.55);
      --sh-lg:      0 16px 48px rgba(0,0,0,0.65);
      --sh-xl:      0 28px 70px rgba(0,0,0,0.75);
      --chip-a-bg:  rgba(0,122,255,0.18);
      --chip-b-bg:  rgba(255,149,0,0.18);
      --chip-c-bg:  rgba(255,45,135,0.18);
      --chip-d-bg:  rgba(0,175,93,0.18);
    }

    /* ── RESET ── */
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{height:100%;scroll-behavior:smooth}
    body{
      font-family:"DM Sans",-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
      background:var(--bg);
      color:var(--text-1);
      min-height:100%;
      -webkit-font-smoothing:antialiased;
      transition:background .4s ease,color .4s ease;
      overflow-x:hidden;
    }
    a{text-decoration:none}
    button{cursor:pointer;font-family:inherit}
    img{display:block}

    /* ── ANIMATED BG CANVAS ── */
    #bgCanvas{
      position:fixed;
      inset:0;
      width:100%;height:100%;
      z-index:0;
      pointer-events:none;
    }

    /* ── LAYOUT ── */
    .page{
      position:relative;
      z-index:1;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:48px 20px 80px;
    }
    .container{
      width:100%;max-width:660px;
      display:flex;flex-direction:column;
      gap:16px;
    }

    /* ── HEADER ── */
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:10px}
    .brand{display:flex;align-items:center;gap:11px;flex-shrink:0}
    .brand-icon{
      width:38px;height:38px;
      background:linear-gradient(135deg,#007AFF 0%,#5AC8FA 100%);
      border-radius:11px;
      display:grid;place-items:center;
      box-shadow:0 4px 16px rgba(0,122,255,0.40);
      flex-shrink:0;
    }
    .brand-icon svg{width:21px;height:21px;fill:#fff}
    .brand-name{
      font-size:22px;font-weight:700;
      letter-spacing:-0.6px;color:var(--text-1);
    }
    .header-actions{display:flex;align-items:center;gap:8px}

    /* home button */
    .home-btn{
      display:flex;align-items:center;gap:7px;
      background:var(--surface);
      border:1px solid var(--border-s);
      border-radius:100px;
      padding:7px 14px 7px 10px;
      font-size:13px;font-weight:600;
      color:var(--text-2);
      box-shadow:var(--sh-sm);
      transition:all .2s ease;
      white-space:nowrap;
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    }
    .home-btn svg{width:15px;height:15px;fill:var(--accent)}
    .home-btn:hover{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
      box-shadow:0 4px 16px rgba(0,122,255,0.35);
      transform:translateY(-1px);
    }
    .home-btn:hover svg{fill:#fff}
    .home-btn:active{transform:scale(0.95)}

    /* theme toggle */
    .theme-btn{
      display:flex;align-items:center;gap:7px;
      background:var(--surface);
      border:1px solid var(--border-s);
      border-radius:100px;
      padding:7px 14px 7px 10px;
      font-size:13px;font-weight:600;
      color:var(--text-2);
      box-shadow:var(--sh-sm);
      transition:all .2s ease;
      white-space:nowrap;
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    }
    .theme-btn svg{width:15px;height:15px;color:var(--accent);transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
    .theme-btn:hover{background:var(--surface-2);transform:translateY(-1px);box-shadow:var(--sh-md)}
    .theme-btn:hover svg{transform:rotate(22deg)}
    .theme-btn:active{transform:scale(0.95)}

    /* ── SEARCH BAR ── */
    .search-wrap{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:18px;
      padding:7px 7px 7px 14px;
      display:flex;align-items:center;gap:8px;
      box-shadow:var(--sh-md);
      transition:box-shadow .25s ease,border-color .25s ease;
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    }
    .search-wrap:focus-within{
      box-shadow:var(--sh-lg),var(--glow);
      border-color:var(--accent);
    }
    .search-wrap .s-icon{
      width:18px;height:18px;
      fill:none;stroke:var(--text-3);stroke-width:2;stroke-linecap:round;
      flex-shrink:0;transition:stroke .2s;
    }
    .search-wrap:focus-within .s-icon{stroke:var(--accent)}
    #input{
      flex:1;border:none;outline:none;background:transparent;
      font-family:inherit;font-size:16px;font-weight:400;
      color:var(--text-1);min-width:0;
    }
    #input::placeholder{color:var(--text-3)}
    .error-tag{
      font-size:12px;font-weight:600;color:var(--danger);
      background:rgba(255,59,48,.10);border-radius:6px;
      padding:3px 9px;white-space:nowrap;
      opacity:0;transform:scale(.85);
      transition:opacity .2s,transform .2s;
      pointer-events:none;flex-shrink:0;
    }
    .error-tag.show{opacity:1;transform:scale(1)}
    .btn-search{
      background:linear-gradient(135deg,#007AFF,#0055D4);
      color:#fff;border:none;border-radius:12px;
      padding:11px 22px;font-size:15px;font-weight:600;
      transition:all .2s ease;white-space:nowrap;flex-shrink:0;
      box-shadow:0 3px 12px rgba(0,122,255,.35);
    }
    .btn-search:hover:not(:disabled){
      transform:translateY(-1px);
      box-shadow:0 8px 24px rgba(0,122,255,.45);
    }
    .btn-search:active:not(:disabled){transform:scale(.96);box-shadow:none}
    .btn-search:disabled{opacity:.5;cursor:not-allowed}

    /* ── LOADING ── */
    .loading{
      display:none;align-items:center;justify-content:center;
      gap:10px;padding:28px;
      color:var(--text-3);font-size:14px;font-weight:500;
    }
    .loading.show{display:flex}
    .spinner{
      width:18px;height:18px;
      border:2px solid var(--border-s);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin .7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── PROFILE CARD ── */
    .profile-card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--sh-xl);
      overflow:hidden;
      display:none;
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      animation:rise .45s cubic-bezier(.22,1,.36,1) both;
    }
    .profile-card.show{display:block}
    @keyframes rise{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

    /* banner */
    .banner{
      height:90px;
      background:linear-gradient(120deg,#007AFF,#5AC8FA,#34C759,#AF52DE,#FF9500,#007AFF);
      background-size:400% 400%;
      animation:bannerShift 10s ease infinite;
      position:relative;
    }
    @keyframes bannerShift{
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }
    .banner::after{
      content:"";position:absolute;inset:0;
      background:linear-gradient(to bottom,transparent 60%,var(--surface) 100%);
    }

    /* profile head */
    .profile-head{padding:0 28px 22px}
    .avatar-wrap{
      position:relative;display:inline-block;
      margin-top:-46px;margin-bottom:14px;
    }
    #avatar{
      width:90px;height:90px;border-radius:50%;
      border:4px solid var(--surface);
      box-shadow:var(--sh-md);object-fit:cover;
      background:var(--surface-2);
      transition:transform .3s ease;
    }
    #avatar:hover{transform:scale(1.04)}
    .online-dot{
      position:absolute;bottom:4px;right:4px;
      width:16px;height:16px;
      background:var(--success);border-radius:50%;
      border:3px solid var(--surface);
    }

    .identity-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .identity-left{flex:1;min-width:0}

    #name{
      font-size:23px;font-weight:700;letter-spacing:-.6px;
      background:linear-gradient(135deg,var(--text-1) 0%,var(--text-2) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    [data-theme="dark"] #name{
      background:linear-gradient(135deg,#FFFFFF 0%,#5AC8FA 100%);
      -webkit-background-clip:text;background-clip:text;
    }

    #user{
      display:inline-block;margin-top:3px;
      font-size:15px;font-weight:500;color:var(--accent);
    }
    #user:hover{text-decoration:underline}

    #date{
      display:inline-flex;align-items:center;gap:5px;
      margin-top:9px;font-size:12px;font-weight:500;
      color:var(--text-3);
      background:var(--surface-2);border:1px solid var(--border);
      border-radius:100px;padding:4px 10px;
    }
    #date svg{width:12px;height:12px;fill:var(--text-3);flex-shrink:0}

    .gh-btn{
      display:inline-flex;align-items:center;gap:6px;
      background:var(--surface-2);
      border:1px solid var(--border-s);
      border-radius:11px;padding:8px 14px;
      font-size:13px;font-weight:600;
      color:var(--text-2);
      transition:all .18s ease;flex-shrink:0;
      align-self:flex-start;
    }
    .gh-btn svg{width:14px;height:14px;fill:var(--text-2)}
    .gh-btn:hover{background:var(--surface-3);transform:translateY(-1px);box-shadow:var(--sh-sm)}
    .gh-btn:active{transform:scale(.96)}

    /* bio */
    .bio-row{padding:0 28px 20px;border-top:1px solid var(--border)}
    .bio-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-3);margin-bottom:7px;margin-top:18px}
    #bio{font-size:15px;font-weight:400;color:var(--text-2);line-height:1.65}

    /* stats */
    .stats-row{
      display:grid;grid-template-columns:repeat(3,1fr);
      padding:18px 18px;gap:10px;
      border-top:1px solid var(--border);
    }
    .stat-block{
      background:var(--surface-2);
      border:1px solid var(--border);
      border-radius:16px;padding:16px 12px;
      text-align:center;
      display:flex;flex-direction:column;align-items:center;gap:4px;
      transition:all .2s ease;position:relative;overflow:hidden;
    }
    .stat-block::before{
      content:"";position:absolute;
      top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,var(--accent),#5AC8FA);
      transform:scaleX(0);transform-origin:left;
      transition:transform .3s ease;
    }
    .stat-block:hover{background:var(--surface-3);transform:translateY(-2px);box-shadow:var(--sh-sm)}
    .stat-block:hover::before{transform:scaleX(1)}
    .stat-num{
      font-size:22px;font-weight:700;letter-spacing:-.8px;
      color:var(--text-1);font-family:"DM Mono",monospace;
    }
    .stat-lbl{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px}

    /* ── INFO GRID ── */
    .info-grid{
      display:grid;grid-template-columns:1fr 1fr;
      gap:10px;padding:18px 18px 24px;
      border-top:1px solid var(--border);
    }
    .info-chip{
      display:flex;align-items:center;gap:12px;
      background:var(--surface-2);border:1px solid var(--border);
      border-radius:16px;padding:14px;
      min-width:0;
      transition:all .2s ease;
    }
    a.info-chip:hover{
      background:var(--surface-3);
      transform:translateY(-2px);
      box-shadow:var(--sh-md);
      border-color:var(--border-s);
    }
    a.info-chip:active{transform:scale(.97)}

    .chip-icon{
      width:40px;height:40px;border-radius:12px;
      display:grid;place-items:center;flex-shrink:0;
    }
    .chip-icon svg{width:20px;height:20px}
    .ci-a{background:var(--chip-a-bg)} .ci-a svg{fill:var(--chip-a-fg)}
    .ci-b{background:var(--chip-b-bg)} .ci-b svg{fill:var(--chip-b-fg)}
    .ci-c{background:var(--chip-c-bg)} .ci-c svg{fill:var(--chip-c-fg)}
    .ci-d{background:var(--chip-d-bg)} .ci-d svg{fill:var(--chip-d-fg)}

    .chip-text{display:flex;flex-direction:column;gap:2px;min-width:0}
    .chip-label{font-size:10.5px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.7px}
    .chip-value{font-size:13px;font-weight:500;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .chip-value.na{color:var(--text-3);font-style:italic}
    .info-chip.na-chip{opacity:.45}

    /* ── EMPTY STATE ── */
    .empty-state{
      display:none;flex-direction:column;align-items:center;
      gap:14px;padding:48px 24px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);box-shadow:var(--sh-md);
      text-align:center;
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      animation:rise .35s cubic-bezier(.22,1,.36,1) both;
    }
    .empty-state.show{display:flex}
    .empty-icon{width:64px;height:64px;background:rgba(255,59,48,.10);border-radius:20px;display:grid;place-items:center}
    .empty-icon svg{width:28px;height:28px;fill:var(--danger)}
    .empty-title{font-size:18px;font-weight:700;color:var(--text-1)}
    .empty-sub{font-size:14px;color:var(--text-3);line-height:1.55}

    /* ── RESPONSIVE ── */
    @media(max-width:520px){
      .page{padding:24px 14px 60px}
      .brand-name{font-size:18px}
      .home-btn span,.theme-btn span{display:none}
      .home-btn,.theme-btn{padding:7px 10px}
      .btn-search{padding:10px 16px;font-size:14px}
      #name{font-size:18px}
      .stat-num{font-size:18px}
      .profile-head,.bio-row{padding-left:16px;padding-right:16px}
      .stats-row,.info-grid{padding-left:12px;padding-right:12px}
      #avatar{width:74px;height:74px}
      .info-grid{grid-template-columns:1fr}
      .gh-btn span{display:none}
    }
  </style>
</head>
<body>

<!-- Background Canvas -->
<canvas id="bgCanvas"></canvas>

<div class="page">
  <div class="container">

    <!-- HEADER -->
    <header class="header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
          </svg>
        </div>
        <span class="brand-name">GitScope</span>
      </div>

      <div class="header-actions">
        <!-- Home button -->
        <button class="home-btn" id="homeBtn" title="My Profile">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
          </svg>
          <span>My Profile</span>
        </button>

        <!-- Theme toggle -->
        <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/>
          </svg>
          <span id="themeLabel">Dark</span>
        </button>
      </div>
    </header>

    <!-- SEARCH -->
    <div class="search-wrap">
      <svg class="s-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/>
      </svg>
      <input type="search" id="input" placeholder="Search a GitHub username…" autocomplete="off" autocorrect="off" spellcheck="false"/>
      <span class="error-tag" id="errorTag">No results</span>
      <button class="btn-search" id="submitBtn">Search</button>
    </div>

    <!-- LOADING -->
    <div class="loading" id="loadingEl">
      <div class="spinner"></div>
      <span>Fetching profile…</span>
    </div>

    <!-- EMPTY STATE -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
      </div>
      <p class="empty-title">User not found</p>
      <p class="empty-sub">No GitHub account matches that username.<br>Double-check and try again.</p>
    </div>

    <!-- PROFILE CARD -->
    <div class="profile-card" id="profileCard">

      <div class="banner"></div>

      <!-- Head -->
      <div class="profile-head">
        <div class="avatar-wrap">
          <img id="avatar" src="" alt="Avatar"/>
          <div class="online-dot"></div>
        </div>
        <div class="identity-row">
          <div class="identity-left">
            <h2 id="name"></h2>
            <a id="user" href="#" target="_blank" rel="noopener noreferrer"></a><br>
            <span id="date">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2zm0 16H5V9h14v11zm0-13H5V6h14v1z"/></svg>
              <span id="dateText">–</span>
            </span>
          </div>
          <a class="gh-btn" id="ghLink" href="#" target="_blank" rel="noopener noreferrer">

<script>
"use strict";

/* ──────────────────── BACKGROUND CANVAS ANIMATION ────────────────────── */
(function initBgCanvas() {
  const canvas = document.getElementById("bgCanvas");
  const ctx    = canvas.getContext("2d");
  let W, H, animId, isDark = false;
  let time = 0;

  /* Light mode — floating soft orbs */
  const ORBS = [
    { x:.15, y:.2,  r:.30, vx: .00014, vy: .00009,  c:[0,122,255] },
    { x:.80, y:.15, r:.24, vx:-.00010, vy: .00014,  c:[90,200,250] },
    { x:.50, y:.78, r:.26, vx: .00011, vy:-.00009,  c:[52,199,89]  },
    { x:.20, y:.65, r:.20, vx: .00008, vy: .00011,  c:[255,149,0]  },
    { x:.78, y:.70, r:.18, vx:-.00009, vy:-.00007,  c:[88,86,214]  },
    { x:.45, y:.40, r:.16, vx: .00013, vy: .00008,  c:[255,45,135] },
  ];

  /* Dark mode — stars */
  const STARS = Array.from({length:140}, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.4 + 0.3,
    base: Math.random() * 0.55 + 0.15,
    spd: Math.random() * 0.018 + 0.004,
    ph:  Math.random() * Math.PI * 2,
  }));

  /* Dark mode — aurora bands */
  const BANDS = [
    { oy:.28, c:[99,102,241],  a:.16, af:.40, wf:.36, wp:0.0 },
    { oy:.42, c:[20,184,166],  a:.12, af:.55, wf:.28, wp:1.8 },
    { oy:.22, c:[139,92,246],  a:.10, af:.35, wf:.44, wp:3.5 },
    { oy:.52, c:[59,130,246],  a:.09, af:.48, wf:.32, wp:5.1 },
    { oy:.35, c:[16,185,129],  a:.08, af:.42, wf:.38, wp:2.4 },
  ];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function drawLight() {
    ctx.clearRect(0,0,W,H);
    ORBS.forEach(o => {
      o.x += o.vx; o.y += o.vy;
      if (o.x < -.3 || o.x > 1.3) o.vx *= -1;
      if (o.y < -.3 || o.y > 1.3) o.vy *= -1;
      const x = o.x*W, y = o.y*H, r = o.r * Math.min(W,H);
      const g = ctx.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0,   `rgba(${o.c},0.18)`);
      g.addColorStop(0.5, `rgba(${o.c},0.07)`);
      g.addColorStop(1,   `rgba(${o.c},0)`);
      ctx.fillStyle = g;
      ctx.fillRect(0,0,W,H);
    });
  }

  function drawDark() {
    ctx.clearRect(0,0,W,H);
    const t = time * 0.003;

    /* stars */
    STARS.forEach(s => {
      const op = s.base * (0.5 + 0.5 * Math.sin(time * s.spd + s.ph));
      ctx.beginPath();
      ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${op})`;
      ctx.fill();
    });

    /* aurora */
    BANDS.forEach(b => {
      const yc  = b.oy * H + Math.sin(t * b.af + b.wp) * b.a * H;
      const bH  = H * 0.22;
      const pts = 14;

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(0, yc - bH);
      for (let i = 0; i <= pts; i++) {
        const x = (i/pts)*W;
        const y = yc - bH/2 + Math.sin(i*0.7 + t*b.wf*2 + b.wp) * H*0.035;
        i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      for (let i = pts; i >= 0; i--) {
        const x = (i/pts)*W;
        const y = yc + bH/2 + Math.sin(i*0.7 + t*b.wf*2 + b.wp + Math.PI) * H*0.025;
        ctx.lineTo(x,y);
      }
      ctx.closePath();

      const g = ctx.createLinearGradient(0, yc-bH, 0, yc+bH);
      g.addColorStop(0,   `rgba(${b.c},0)`);
      g.addColorStop(0.5, `rgba(${b.c},${b.a})`);
      g.addColorStop(1,   `rgba(${b.c},0)`);
      ctx.fillStyle = g;
      ctx.fill();
      ctx.restore();
    });
  }

  function loop() {
    time++;
    isDark ? drawDark() : drawLight();
    animId = requestAnimationFrame(loop);
  }

  window.setBgMode = function(dark) {
    isDark = dark;
  };

  resize();
  window.addEventListener("resize", resize);
  loop();
})();

/* ──────────────────── THEME ────────────────────── */
const MOON = `<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/>`;
const SUN  = `
  <circle cx="12" cy="12" r="4" fill="currentColor"/>
  <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <line x1="12" y1="2"  x2="12" y2="5"/>
    <line x1="12" y1="19" x2="12" y2="22"/>
    <line x1="2"  y1="12" x2="5"  y2="12"/>
    <line x1="19" y1="12" x2="22" y2="12"/>
    <line x1="4.93"  y1="4.93"  x2="7.05"  y2="7.05"/>
    <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/>
    <line x1="4.93"  y1="19.07" x2="7.05"  y2="16.95"/>
    <line x1="16.95" y1="7.05"  x2="19.07" y2="4.93"/>
  </g>`;

let darkMode = false;

function applyTheme(dark) {
  darkMode = dark;
  document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  document.getElementById("themeIcon").innerHTML = dark ? SUN : MOON;
  document.getElementById("themeLabel").textContent = dark ? "Light" : "Dark";
  window.setBgMode?.(dark);
  try { localStorage.setItem("gitscope-theme", dark ? "dark" : "light"); } catch(_) {}
}

(function initTheme() {
  try {
    const s = localStorage.getItem("gitscope-theme");
    if (s) { applyTheme(s === "dark"); return; }
  } catch(_) {}
  applyTheme(window.matchMedia?.("(prefers-color-scheme:dark)").matches ?? false);
})();

document.getElementById("themeBtn").addEventListener("click", () => applyTheme(!darkMode));

/* ──────────────────── CONSTANTS ────────────────────── */
const API       = "https://api.github.com/users/";
const MONTHS    = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const HOME_USER = "Zephyrex21";

/* ── Icon SVG strings ── */
const SVG = {
  leetcode: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M13.483 0a1.374 1.374 0 00-.961.438L7.116 6.226l-3.854 4.126a5.266 5.266 0 00-1.209 2.104 5.527 5.527 0 00.062 2.362 5.83 5.83 0 00.349 1.017 5.938 5.938 0 001.271 1.818l4.277 4.193.039.038c2.248 2.165 5.852 2.133 8.063-.074l2.396-2.392c.54-.54.54-1.414.003-1.955a1.378 1.378 0 00-1.951-.003l-2.396 2.392a3.021 3.021 0 01-4.205.038l-.02-.019-4.276-4.193c-.652-.64-.972-1.469-.948-2.263a2.545 2.545 0 01.619-1.164L9.13 8.114c1.058-1.134 3.204-1.27 4.43-.278l3.501 2.831c.593.48 1.461.387 1.94-.207a1.384 1.384 0 00-.207-1.943l-3.5-2.831c-.8-.647-1.766-1.045-2.774-1.202l2.015-2.158A1.384 1.384 0 0013.483 0zm-2.866 12.815a1.38 1.38 0 000 2.764H20.79a1.38 1.38 0 000-2.764z"/></svg>`,
  instagram: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zm0 10.162a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>`,
  netlify: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16.686 7.32l-3.809-3.81-.852-.853a1.07 1.07 0 00-1.513 0L5.314 7.855a1.07 1.07 0 000 1.513l.189.188 4.063 4.064.113.113.815.815a1.07 1.07 0 001.513 0l.064-.064 3.843-3.843.188-.188a1.07 1.07 0 000-1.513zM9.657 12.91l-3.163-3.163 3.163-3.163 3.163 3.163-3.163 3.163zm0 0M8.754 4.336L4.508 8.582a1.07 1.07 0 000 1.513l4.246 4.246V4.336zm6.49 0v10.005l4.247-4.246a1.07 1.07 0 000-1.513L15.244 4.336z"/><path d="M9.657 12.91l-3.163-3.163 3.163-3.163 3.163 3.163-3.163 3.163z"/></svg>`,
  website: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>`,
  twitter: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`,
  company: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>`,
};

/* Home user hardcoded chip definitions */
const HOME_CHIPS = {
  b: { label:"LeetCode",  value:"Zephyrex_21",        href:"https://leetcode.com/u/Zephyrex_21/",                    icon:SVG.leetcode,  color:"ci-b" },
  c: { label:"Instagram", value:"@_raj.shekharrr",    href:"https://www.instagram.com/_raj.shekharrr/",              icon:SVG.instagram, color:"ci-c" },
  d: { label:"Netlify",   value:"Zephyr Labs",         href:"https://app.netlify.com/teams/zephyr-labs/projects",    icon:SVG.netlify,   color:"ci-d" },
};

/* ──────────────────── DOM ────────────────────── */
const $ = id => document.getElementById(id);
const el = {
  input:       $("input"),
  submit:      $("submitBtn"),
  loading:     $("loadingEl"),
  profileCard: $("profileCard"),
  emptyState:  $("emptyState"),
  errorTag:    $("errorTag"),
  avatar:      $("avatar"),
  name:        $("name"),
  user:        $("user"),
  dateText:    $("dateText"),
  bio:         $("bio"),
  repos:       $("repos"),
  followers:   $("followers"),
  following:   $("following"),
  ghLink:      $("ghLink"),
  location:    $("location"),
  chipLoc:     $("chip-location"),
};

/* ──────────────────── UI HELPERS ────────────────────── */
function showError(on, msg) {
  el.errorTag.textContent = msg || "No results";
  el.errorTag.classList.toggle("show", on);
}
function setLoading(on) {
  el.loading.classList.toggle("show", on);
  el.submit.disabled    = on;
  el.submit.textContent = on ? "…" : "Search";
}
function resetUI() {
  showError(false);
  el.profileCard.classList.remove("show");
  el.emptyState.classList.remove("show");
}
function fmt(n) {
  if (n == null) return "–";
  if (n >= 1_000_000) return (n/1e6).toFixed(1).replace(/\.0$/,"")+"M";
  if (n >= 1_000)     return (n/1e3).toFixed(1).replace(/\.0$/,"")+"k";
  return String(n);
}

/* apply a chip definition { label, value, href, icon, color } to a slot (b/c/d) */
function applyDynChip(slot, def) {
  const chip  = $(  `chip-${slot}`);
  const icon  = $(`chip-${slot}-icon`);
  const label = $(`chip-${slot}-label`);
  const val   = $(`chip-${slot}-value`);

  // update color class
  icon.className = `chip-icon ${def.color}`;
  icon.innerHTML = def.icon;
  label.textContent = def.label;

  const ok = !!(def.value?.trim());
  chip.classList.toggle("na-chip", !ok);
  val.classList.toggle("na", !ok);
  val.textContent = ok ? def.value : "Not available";
  chip.href = (ok && def.href) ? def.href : "#";
}

function setLocChip(value) {
  const ok = !!(value?.trim());
  el.chipLoc.classList.toggle("na-chip", !ok);
  el.location.classList.toggle("na", !ok);
  el.location.textContent = ok ? value : "Not available";
}

/* build other-user chip defs from GitHub API data */
function buildOtherChips(d) {
  const blog = d.blog?.trim() || "";
  const blogUrl = blog ? (blog.startsWith("http") ? blog : `https://${blog}`) : "";
  const blogDisplay = blog.replace(/^https?:\/\/(www\.)?/i,"").replace(/\/$/,"");

  const tw = d.twitter_username?.trim() || "";
  const co = (d.company || "").trim().replace(/^@/,"");

  return {
    b: { label:"Website",  value:blogDisplay, href:blogUrl,                           icon:SVG.website,  color:"ci-b" },
    c: { label:"Twitter",  value:tw ? `@${tw}` : "", href:tw ? `https://x.com/${tw}` : "#", icon:SVG.twitter,  color:"ci-c" },
    d: { label:"Company",  value:co,          href:"#",                               icon:SVG.company,  color:"ci-d" },
  };
}

/* ──────────────────── RENDER ────────────────────── */
function renderProfile(d) {
  el.avatar.src = d.avatar_url || "";
  el.avatar.alt = `${d.login}'s avatar`;

  el.name.textContent = d.name || d.login;
  el.user.textContent = `@${d.login}`;
  el.user.href        = d.html_url;
  el.ghLink.href      = d.html_url;

  if (d.created_at) {
    const [yr,mo,day] = d.created_at.split("T")[0].split("-");
    el.dateText.textContent = `Joined ${+day} ${MONTHS[+mo-1]} ${yr}`;
  } else {
    el.dateText.textContent = "–";
  }

  el.bio.textContent       = d.bio?.trim() || "This profile has no bio.";
  el.repos.textContent     = fmt(d.public_repos);
  el.followers.textContent = fmt(d.followers);
  el.following.textContent = fmt(d.following);

  // Location — always dynamic
  setLocChip(d.location || "");

  // Chips b / c / d — home user gets personal hardcoded links, others get GitHub socials
  const isHome = d.login.toLowerCase() === HOME_USER.toLowerCase();
  const chips  = isHome ? HOME_CHIPS : buildOtherChips(d);
  applyDynChip("b", chips.b);
  applyDynChip("c", chips.c);
  applyDynChip("d", chips.d);
}

/* ──────────────────── FETCH ────────────────────── */
async function fetchProfile(username) {
  resetUI();
  setLoading(true);
  try {
    const res  = await fetch(`${API}${encodeURIComponent(username.trim())}`);
    const data = await res.json();
    setLoading(false);
    if (data.message === "Not Found" || res.status === 404) {
      el.emptyState.classList.add("show");
    } else if (data.message) {
      showError(true, "API error");
    } else {
      renderProfile(data);
      /* force re-animation */
      el.profileCard.style.animation = "none";
      requestAnimationFrame(() => {
        el.profileCard.style.animation = "";
        el.profileCard.classList.add("show");
      });
    }
  } catch(err) {
    setLoading(false);
    showError(true, "Network error");
    console.error("[GitScope]", err);
  }
}

/* ──────────────────── EVENT LISTENERS ────────────────────── */
el.submit.addEventListener("click", () => {
  const v = el.input.value.trim();
  if (v) fetchProfile(v);
});

el.input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const v = el.input.value.trim();
    if (v) fetchProfile(v);
  }
});

el.input.addEventListener("input", () => showError(false));

// Home button
$("homeBtn").addEventListener("click", () => {
  el.input.value = HOME_USER;
  fetchProfile(HOME_USER);
});

// Cmd/Ctrl + K → focus search
document.addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key === "k") {
    e.preventDefault();
    el.input.focus(); el.input.select();
  }
});

/* ──────────────────── INIT ────────────────────── */
fetchProfile(HOME_USER);
</script>
