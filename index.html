<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitScope · GitHub Profile Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Background Canvas -->
<canvas id="bgCanvas"></canvas>

<div class="page">
  <div class="container">

    <!-- HEADER -->
    <header class="header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
          </svg>
        </div>
        <span class="brand-name">GitScope</span>
      </div>

      <div class="header-actions">
        <!-- Home button -->
        <button class="home-btn" id="homeBtn" title="My Profile">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
          </svg>
          <span>My Profile</span>
        </button>

        <!-- Theme toggle -->
        <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/>
          </svg>
          <span id="themeLabel">Dark</span>
        </button>
      </div>
    </header>

    <!-- SEARCH -->
    <div class="search-wrap">
      <svg class="s-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/>
      </svg>
      <input type="search" id="input" placeholder="Search a GitHub username…" autocomplete="off" autocorrect="off" spellcheck="false"/>
      <span class="error-tag" id="errorTag">No results</span>
      <button class="btn-search" id="submitBtn">Search</button>
    </div>

    <!-- LOADING -->
    <div class="loading" id="loadingEl">
      <div class="spinner"></div>
      <span>Fetching profile…</span>
    </div>

    <!-- EMPTY STATE -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
      </div>
      <p class="empty-title">User not found</p>
      <p class="empty-sub">No GitHub account matches that username.<br>Double-check and try again.</p>
    </div>

    <!-- PROFILE CARD -->
    <div class="profile-card" id="profileCard">

      <div class="banner"></div>

      <!-- Head -->
      <div class="profile-head">
        <div class="avatar-wrap">
          <img id="avatar" src="" alt="Avatar"/>
          <div class="online-dot"></div>
        </div>
        <div class="identity-row">
          <div class="identity-left">
            <h2 id="name"></h2>
            <a id="user" href="#" target="_blank" rel="noopener noreferrer"></a><br>
            <span id="date">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2zm0 16H5V9h14v11zm0-13H5V6h14v1z"/></svg>
              <span id="dateText">–</span>
            </span>
          </div>
          <a class="gh-btn" id="ghLink" href="#" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
            <span>GitHub</span>
          </a>
        </div>
      </div>

      <!-- Bio -->
      <div class="bio-row">
        <p class="bio-label">About</p>
        <p id="bio"></p>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-block">
          <span class="stat-num" id="repos">–</span>
          <span class="stat-lbl">Repos</span>
        </div>
        <div class="stat-block">
          <span class="stat-num" id="followers">–</span>
          <span class="stat-lbl">Followers</span>
        </div>
        <div class="stat-block">
          <span class="stat-num" id="following">–</span>
          <span class="stat-lbl">Following</span>
        </div>
      </div>

      <!-- Info Grid — chips b/c/d populated dynamically by JS -->
      <div class="info-grid">

        <!-- Location — always dynamic -->
        <div class="info-chip" id="chip-location">
          <div class="chip-icon ci-a">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>
          </div>
          <div class="chip-text">
            <span class="chip-label">Location</span>
            <span class="chip-value" id="location">–</span>
          </div>
        </div>

        <!-- Chip B — JS controlled -->
        <a class="info-chip" id="chip-b" href="#" target="_blank" rel="noopener noreferrer">
          <div class="chip-icon ci-b" id="chip-b-icon"></div>
          <div class="chip-text">
            <span class="chip-label" id="chip-b-label">–</span>
            <span class="chip-value" id="chip-b-value">–</span>
          </div>
        </a>

        <!-- Chip C — JS controlled -->
        <a class="info-chip" id="chip-c" href="#" target="_blank" rel="noopener noreferrer">
          <div class="chip-icon ci-c" id="chip-c-icon"></div>
          <div class="chip-text">
            <span class="chip-label" id="chip-c-label">–</span>
            <span class="chip-value" id="chip-c-value">–</span>
          </div>
        </a>

        <!-- Chip D — JS controlled -->
        <a class="info-chip" id="chip-d" href="#" target="_blank" rel="noopener noreferrer">
          <div class="chip-icon ci-d" id="chip-d-icon"></div>
          <div class="chip-text">
            <span class="chip-label" id="chip-d-label">–</span>
            <span class="chip-value" id="chip-d-value">–</span>
          </div>
        </a>

      </div><!-- /info-grid -->
    </div><!-- /profile-card -->

  </div><!-- /container -->
</div><!-- /page -->

<script src="script.js"></script>

</body>
</html>
